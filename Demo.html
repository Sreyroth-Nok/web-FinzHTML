<!doctype html>
<html class="scroll-smooth" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Request a Demo | FinzTrust Engagement</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#4B9B4B" },
          fontFamily: { display: ["Outfit", "sans-serif"] },
        },
      },
    };
  </script>
  <script src="layout-manager.js"></script>
</head>

<body
  class="font-display bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
  <div id="global-header"></div>

  <main class="pt-32 pb-20 px-6">
    <div class="max-w-3xl mx-auto">
      <div class="text-center mb-16">
        <h1 data-reveal class="text-5xl md:text-7xl font-black tracking-tight mb-6">Schedule a <span
            class="text-primary italic">Live Demo.</span></h1>
        <p data-reveal class="text-xl text-slate-500 dark:text-slate-400 leading-relaxed font-medium delay-100">
          Experience the unified ecosystem first-hand. Our experts will show you how we solve your core challenges.</p>
      </div>

      <div data-reveal
        class="bg-white dark:bg-white/5 rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-primary/5 border border-slate-100 dark:border-white/5 delay-200">
        <form class="space-y-8">
          <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-2">
              <label class="text-sm font-bold uppercase tracking-widest text-slate-400">Full Name</label>
              <input type="text" placeholder="John Doe"
                class="w-full bg-slate-50 dark:bg-white/5 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-900 dark:text-white" />
            </div>
            <div class="space-y-2">
              <label class="text-sm font-bold uppercase tracking-widest text-slate-400">Institution</label>
              <input type="text" placeholder="Your Bank/MFI"
                class="w-full bg-slate-50 dark:bg-white/5 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-900 dark:text-white" />
            </div>
          </div>

          <div class="grid md:grid-cols-2 gap-8">
            <div class="space-y-2">
              <label class="text-sm font-bold uppercase tracking-widest text-slate-400">Role</label>
              <input type="text" placeholder="CEO / IT Manager"
                class="w-full bg-slate-50 dark:bg-white/5 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-900 dark:text-white" />
            </div>
            <div class="space-y-2">
              <label class="text-sm font-bold uppercase tracking-widest text-slate-400">Contact Email</label>
              <input type="email" placeholder="john@institution.com"
                class="w-full bg-slate-50 dark:bg-white/5 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-900 dark:text-white" />
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-sm font-bold uppercase tracking-widest text-slate-400">Product Interest</label>
            <select
              class="w-full bg-slate-50 dark:bg-white/5 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-900 dark:text-white appearance-none">
              <option>FinzCore 360 (Backend)</option>
              <option>RCI Mobile (Field App)</option>
              <option>FinzLoan (Consumer App)</option>
              <option>Unified Ecosystem (Full Suite)</option>
            </select>
          </div>

          <button type="submit"
            class="w-full py-5 bg-primary text-white rounded-2xl text-xl font-bold shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all btn-pulse">Submit
            Demo Request</button>
        </form>
      </div>

      <div data-reveal class="mt-20 text-center space-y-4 delay-300">
        <h4 class="text-2xl font-bold">Our Support Commitment</h4>
        <p class="text-slate-500 dark:text-slate-400 max-w-xl mx-auto leading-relaxed">We listen to your challenges,
          consult on best practices, and provide complete CBS support with continuous process improvement.</p>
      </div>
    </div>
  </main>

  <div id="global-footer"></div>

  <script src="micro-interactions.js"></script>
</body>

</html>
</main>

<div id="global-footer"></div>

<script src="micro-interactions.js"></script>
</body>

</html>
